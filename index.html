		<span class="snowflake"><img src="/resources/images/c.png" width="32" height="32"></span>
	</div>	
	<div id="snowflakeContainer2">
		<span class="snowflake2"><img src="/resources/images/h.svg" width="32" height="32"></span>
	</div>

<body>
<div class="dim"> 
	<div id="flex-container">
		<div class="test">
			<h1>catZone</h1>
			<div id="bwrap">
				<p> Redirects: </p>
				<a class="button button-visual" href="/index_old.html">Original index</a>
				<div class="break"></div>
				<a class="button button-visual" href="/misc/">misc</a>
				<div class="break"></div>
				<a class="button button-visual" href="https://static1.e926.net/data/8f/cf/8fcfd1afe218a6ad0f7541651a6b42aa.gif">wonderful</a>
				<div class="break bordered"></div>
				<button class="button disabled">FTP: Cat Archive </button>
				<div class="break bordered"></div>
				<button id="unmuteButton" class="button">Toggle audio</button>
			</div>
			<video id="aud" muted loop oncanplay="this.muted=true" width="0px">
				<source src="/resources/audio/dababy.mp3" type="audio/mpeg">
				nutsack
			</video>
			
			<script>
				unmuteButton.addEventListener('click', function() {
					aud.volume = 0.1;
					if(aud.muted == true){
						document.getElementById("unmuteButton").innerHTML = "Audio <span style=\"color: #00ff00\">ON</span>";
						aud.muted = false;
						aud.play();
					} else {
						document.getElementById("unmuteButton").innerHTML = "Audio <span style=\"color: #ff0000\">OFF</span>";
						aud.muted = true;
					}
					
				});
			</script>
